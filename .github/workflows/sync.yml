name: Auto-Sync Drexel Learn

on:
  schedule:
    # Run every 6 hours
    - cron: '17 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Sync from Drexel Learn
        env:
          DREXEL_USERNAME: ${{ secrets.DREXEL_USERNAME }}
          DREXEL_PASSWORD: ${{ secrets.DREXEL_PASSWORD }}
        run: python3 auto_sync.py

      - name: Commit and push if changed
        run: |
          git config user.name "Austin's Master Dash Bot"
          git config user.email "bot@austinsmasterdash.github.io"
          git add tasks.json
          git diff --staged --quiet || (git commit -m "Auto-sync tasks from Drexel Learn [$(date -u '+%Y-%m-%d %H:%M UTC')]" && git push)
